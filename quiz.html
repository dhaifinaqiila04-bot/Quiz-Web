<html>
    <head> 
        <meta charset="UTF-8">
        <title>My Website</title>
        <link rel="stylesheet" href="quiz.css">
    </head>
    <body>
        <div id="quiz">
            <div class="progress">
                <div id="noQuestion">No:<span id="number">0</span></div>
                <div id="timer">Time Left: <span id="time">30</span>s</div>
            </div>
            <div id="question">Question here</div>
            <div id="pickOption" style="margin-right: 600px; margin-top: 10px;">Pick an option:</div>
            <div id="options"></div>
            <div id="result">Your score: <span id="score">0</span></div>
            <button id="restart-btn">Restart Quiz</div>
        </div>
        <button id="start-btn">Start Quiz</div>
    <script src="quiz.js"></script>
    </body>
</html>
